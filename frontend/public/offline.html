<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Soil2Crop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #1a1a1a;
      font-size: 28px;
      margin-bottom: 16px;
    }
    
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .status-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    
    .features {
      text-align: left;
      background: #f9fafb;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #374151;
    }
    
    .feature-icon {
      font-size: 20px;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    
    <div class="status-badge">
      🔄 Offline Mode Active
    </div>
    
    <p>
      Don't worry! You can still access your cached data and continue working. 
      Your data will sync automatically when you're back online.
    </p>
    
    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">✅</span>
        <span>View last soil report</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">✅</span>
        <span>View crop recommendations</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">✅</span>
        <span>Browse saved market prices</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">⏳</span>
        <span>Actions queued for sync</span>
      </div>
    </div>
    
    <button onclick="window.location.reload()">
      🔄 Try Reconnecting
    </button>
  </div>
  
  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });
    
    // Check connection status every 5 seconds
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
